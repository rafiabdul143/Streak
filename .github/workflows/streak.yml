name: GitStreak AI

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest
    env:
      # Fixes the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetches all history to allow for rebasing
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Update Script
        run: node scripts/update.js

      - name: Commit and Push Changes
        run: |
          git config user.name "GitStreak AI"
          git config user.email "actions@github.com"
          
          # Force a change to ensure the streak stays active
          echo "Last run: $(date)" > heartbeat.txt
          
          git add .
          
          # Only commit if there are changes; '|| exit 0' prevents failure if clean
          git commit -m "chore: automated repository maintenance" || exit 0
          
          # Pull remote changes first to fix the [rejected] error
          git pull --rebase origin main
          
          # Final push
          git push origin main
