name: GitStreak AI

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch all history so git knows how to merge
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Update Script
        run: node scripts/update.js

      - name: Commit and Push Changes
        run: |
          git config user.name "GitStreak AI"
          git config user.email "actions@github.com"
          
          git add .
          
          # Only proceed if there are actual changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: automated repository maintenance"
          
          # Pull with rebase to handle the "fetch first" error
          git pull --rebase origin main
          
          # Finally, push the merged changes
          git push origin main
