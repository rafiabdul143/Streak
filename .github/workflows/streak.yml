name: GitStreak AI

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Fetches all history to allow for merging/rebasing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Update Script
        run: node scripts/update.js

      - name: Commit and Push Changes
        run: |
          git config user.name "GitStreak AI"
          git config user.email "actions@github.com"
          
          git add .
          
          # Check if there are changes to avoid the "nothing to commit" error
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
            exit 0
          fi

          git commit -m "chore: automated repository maintenance"
          
          # Pull latest changes from remote to fix the (fetch first) error
          git pull --rebase origin main
          
          # Push the combined changes back to main
          git push origin main
