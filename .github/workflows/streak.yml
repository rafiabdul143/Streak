name: GitStreak AI

on:
  schedule:
    - cron: "17 18 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Update Script
        run: node scripts/update.js

      - name: Commit Changes
        run: |
          git config user.name "GitStreak AI"
          git config user.email "actions@github.com"

          git add .

          git commit -m "chore: automated repository maintenance" || echo "No changes"

          git push