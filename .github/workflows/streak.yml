name: GitStreak AI

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest
    env:
      # Fixes the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Update Script
        run: node scripts/update.js

      - name: Commit and Push Changes
        run: |
          git config user.name "M.A Rafi"
          git config user.email "mohdabdulrafi17@gmail.com"
          
          # 1. Force a change in case update.js didn't modify anything
          # This ensures your "streak" always has a commit to push
          date > last_run.txt
          
          git add .
          
          # 2. Commit only if there's something to save
          git commit -m "chore: automated repository maintenance" || echo "No changes to commit"
          
          # 3. Pull with rebase to fix the (fetch first) error
          git pull --rebase origin main
          
          # 4. Push the final result
          git push origin main
